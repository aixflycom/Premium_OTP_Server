<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperOTP — Admin Number Pool</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#6366f1; --primary-dark:#4f46e5;
            --success:#10b981; --danger:#ef4444;
            --bg:#f1f5f9; --surface:#fff;
            --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
            --sidebar:260px; --topbar:68px; --radius:12px;
            --shadow:0 1px 3px rgb(0 0 0/.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
        .sidebar-logo { height:var(--topbar); display:flex; align-items:center; gap:10px; padding:0 24px; border-bottom:1px solid var(--border); font-size:20px; font-weight:800; color:var(--primary); }
        .sidebar-logo span { font-size:10px; background:var(--danger); color:#fff; padding:2px 7px; border-radius:4px; }
        .nav { padding:20px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
        .nav a { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; font-size:14px; font-weight:600; color:var(--muted); text-decoration:none; transition:.15s; }
        .nav a:hover { background:#f1f5f9; color:var(--text); }
        .nav a.active { background:#eff6ff; color:var(--primary); }
        .nav a .icon { font-size:17px; width:22px; text-align:center; }
        .sidebar-footer { padding:16px; border-top:1px solid var(--border); }
        .sidebar-footer button { width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--surface); font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; }
        .sidebar-footer button:hover { background:#fef2f2; color:var(--danger); }
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .topbar { height:var(--topbar); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 32px; flex-shrink:0; }
        .topbar-title { font-size:18px; font-weight:700; }
        .page-content { flex:1; overflow-y:auto; padding:28px 32px; display:grid; grid-template-columns: 1fr 1.5fr; gap:24px; }
        @media (max-width: 1024px) { .page-content { grid-template-columns: 1fr; } }
        .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); display:flex; flex-direction:column; }
        .card-head { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .card-title { font-size:15px; font-weight:700; }
        .card-body { padding:24px; }
        textarea { width:100%; height:260px; padding:16px; border-radius:8px; border:1px solid var(--border); background:#f8fafc; font-family:monospace; font-size:14px; outline:none; resize:none; margin-bottom:16px; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:.15s; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-outline { background:var(--surface); border:1px solid var(--border); color:var(--text); }
        .btn-danger { background:#fee2e2; color:#dc2626; }
        table { width:100%; border-collapse:collapse; }
        th { padding:12px 20px; font-size:11px; font-weight:700; color:var(--muted); text-align:left; background:#f8fafc; border-bottom:1px solid var(--border); text-transform:uppercase; }
        td { padding:14px 20px; font-size:13px; border-bottom:1px solid var(--border); }
        .badge { padding:3px 8px; border-radius:5px; font-size:10px; font-weight:700; text-transform:uppercase; }
        .badge-ready { background:#dcfce7; color:#16a34a; }
        .badge-use { background:#eff6ff; color:#2563eb; }
        .toast { position:fixed; bottom:24px; right:24px; background:#0f172a; color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:600; display:none; z-index:999; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">SuperOTP <span>ADMIN</span></div>
    <nav class="nav">
        <a href="/admin"><span class="icon">👥</span> Users & Billing</a>
        <a href="/admin/numbers" class="active"><span class="icon">📱</span> Admin Pool</a>
        <a href="/admin/automation"><span class="icon">⚙️</span> Automation Logic</a>
        <a href="/admin/settings"><span class="icon">🔧</span> System Settings</a>
    </nav>
    <div class="sidebar-footer">
        <button onclick="logout()">🚪 Logout</button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div class="topbar-title">📱 Admin Number Pool</div>
    </div>
    <div class="page-content">
        <div class="card">
            <div class="card-head"><div class="card-title">Upload Numbers</div></div>
            <div class="card-body">
                <p style="font-size:12px; color:var(--muted); margin-bottom:12px;">These numbers will be shared with users who have "Admin Numbers" restriction enabled.</p>
                <textarea id="numbers-input" placeholder="Paste phone numbers (one per line)..."></textarea>
                <div style="display:flex; gap:12px">
                    <button class="btn btn-primary" style="flex:1" onclick="addNumbers()">Upload to Shared Pool</button>
                    <button class="btn btn-outline" onclick="clearNumbers()">Purge Pool</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-head">
                <div class="card-title">Shared Pool Status</div>
                <span id="ready-badge" class="badge badge-ready">0 READY</span>
            </div>
            <div style="overflow-x:auto; max-height:calc(100vh - 200px);">
                <table>
                    <thead>
                        <tr><th>Phone Number</th><th>Status</th><th>Last Device</th><th>Activity</th></tr>
                    </thead>
                    <tbody id="numbers-tbody">
                        <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--muted);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    function toast(msg, ok=true) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = ok ? '#0f172a' : '#dc2626';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function loadNumbers() {
        const res = await fetch('/web/api/numbers');
        const data = await res.json();
        if (!data.success) return;
        
        const readyCount = data.numbers.filter(n => n.status === 'READY').length;
        document.getElementById('ready-badge').textContent = `${readyCount} READY`;

        const tbody = document.getElementById('numbers-tbody');
        if (!data.numbers.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--muted);">No shared numbers found</td></tr>';
            return;
        }
        tbody.innerHTML = data.numbers.map(n => `
            <tr>
                <td><b>${n.phone_number}</b></td>
                <td><span class="badge ${n.status==='READY'?'badge-ready':'badge-use'}">${n.status}</span></td>
                <td><code style="font-size:11px">${n.device_id || '—'}</code></td>
                <td style="font-size:11px; color:var(--muted)">${new Date(n.updated_at).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    async function addNumbers() {
        const input = document.getElementById('numbers-input').value;
        if (!input.trim()) return;
        const res = await fetch('/web/api/add-numbers', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numbers: input })
        });
        const data = await res.json();
        if (data.success) {
            toast(`✅ Successfully added ${data.added} numbers!`);
            document.getElementById('numbers-input').value = '';
            loadNumbers();
        } else toast(data.error || 'Failed', false);
    }

    async function clearNumbers() {
        if (!confirm("Are you sure you want to clear the SHARED pool? Users using admin numbers will be affected.")) return;
        const res = await fetch('/web/api/clear-numbers', { method: 'POST' });
        if ((await res.json()).success) { toast('Shared pool cleared'); loadNumbers(); }
    }

    async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/superotp'; }

    loadNumbers();

    // Real-time via SocketIO — refresh pool when bot allocates/returns numbers
    const numSocket = io({ transportOptions: { polling: { extraHeaders: {} } } });
    numSocket.on('bot_status_update', () => loadNumbers());
    numSocket.on('stats_update',      () => loadNumbers());
    // Fallback every 60s in case socket drops
    setInterval(loadNumbers, 60000);

</script>
</body>
</html>
